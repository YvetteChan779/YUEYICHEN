<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FBFD"/>
      <stop offset="0.55" stop-color="#F2F7FA"/>
      <stop offset="1" stop-color="#EEF4F2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D9CDB"/>
      <stop offset="1" stop-color="#1D6FA3"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28B7A9"/>
      <stop offset="1" stop-color="#148074"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B61FF"/>
      <stop offset="1" stop-color="#4B3DB8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1D3340" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0L10 4L0 8V0Z" fill="#5E7280"/>
    </marker>
    <style>
      .title{font:700 34px Inter,Arial,sans-serif;fill:#17313D}
      .sub{font:500 15px Inter,Arial,sans-serif;fill:#667985}
      .band{font:700 13px Inter,Arial,sans-serif;letter-spacing:.08em;fill:#49606D}
      .node-title{font:700 16px Inter,Arial,sans-serif;fill:#17313D}
      .node-small{font:500 12px Inter,Arial,sans-serif;fill:#637783}
      .white-title{font:700 16px Inter,Arial,sans-serif;fill:#FFFFFF}
      .white-small{font:500 12px Inter,Arial,sans-serif;fill:#EAF7FB}
      .mono{font:500 12px JetBrains Mono,Consolas,monospace;fill:#566B78}
      .chip{fill:#FFFFFF;stroke:#C9D8DF;stroke-width:1}
      .box{fill:#FFFFFF;stroke:#CBD8DF;stroke-width:1.2;filter:url(#shadow)}
      .arrow{stroke:#5E7280;stroke-width:2;marker-end:url(#arrow)}
      .dash{stroke:#28B7A9;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="96" r="72" fill="#DFF4F1"/>
  <circle cx="162" cy="620" r="92" fill="#E4EFFA"/>

  <text x="56" y="62" class="title">DreamZero x ALOHA/LeKiwi SFT Pipeline</text>
  <text x="56" y="92" class="sub">LeRobot data collection -> GEAR metadata -> DreamZero LoRA fine-tuning -> receding-horizon robot inference</text>

  <rect x="42" y="124" width="1196" height="130" rx="18" fill="#FFFFFF" stroke="#D4E1E7"/>
  <rect x="42" y="290" width="1196" height="140" rx="18" fill="#FFFFFF" stroke="#D4E1E7"/>
  <rect x="42" y="466" width="1196" height="160" rx="18" fill="#FFFFFF" stroke="#D4E1E7"/>
  <text x="64" y="152" class="band">DATA ACQUISITION</text>
  <text x="64" y="318" class="band">TRAINING / FINE-TUNING</text>
  <text x="64" y="494" class="band">DEPLOYMENT / EVALUATION</text>

  <!-- Row 1 -->
  <rect class="box" x="78" y="170" width="170" height="58" rx="14"/>
  <text x="163" y="194" text-anchor="middle" class="node-title">Teleoperation</text>
  <text x="163" y="214" text-anchor="middle" class="node-small">leader arm / keyboard</text>

  <line class="arrow" x1="256" y1="199" x2="298" y2="199"/>
  <rect class="box" x="306" y="160" width="180" height="78" rx="14"/>
  <text x="396" y="188" text-anchor="middle" class="node-title">3-View Capture</text>
  <text x="396" y="208" text-anchor="middle" class="node-small">front + side + wrist</text>
  <text x="396" y="226" text-anchor="middle" class="mono">30 Hz synchronized</text>

  <line class="arrow" x1="494" y1="199" x2="536" y2="199"/>
  <rect class="box" x="544" y="160" width="190" height="78" rx="14"/>
  <text x="639" y="188" text-anchor="middle" class="node-title">LeRobot Dataset</text>
  <text x="639" y="208" text-anchor="middle" class="node-small">RGB + state + action</text>
  <text x="639" y="226" text-anchor="middle" class="mono">episode parquet/meta</text>

  <line class="arrow" x1="742" y1="199" x2="784" y2="199"/>
  <rect class="box" x="792" y="160" width="190" height="78" rx="14"/>
  <text x="887" y="188" text-anchor="middle" class="node-title">Quality Gate</text>
  <text x="887" y="208" text-anchor="middle" class="node-small">action scale / timing</text>
  <text x="887" y="226" text-anchor="middle" class="mono">camera-order audit</text>

  <line class="arrow" x1="990" y1="199" x2="1032" y2="199"/>
  <rect x="1040" y="160" width="160" height="78" rx="14" fill="url(#teal)" filter="url(#shadow)"/>
  <text x="1120" y="188" text-anchor="middle" class="white-title">GEAR Format</text>
  <text x="1120" y="208" text-anchor="middle" class="white-small">modality.json</text>
  <text x="1120" y="226" text-anchor="middle" class="white-small">aloha_lekiwi tag</text>

  <!-- Row 2 -->
  <rect class="box" x="100" y="340" width="184" height="64" rx="14"/>
  <text x="192" y="365" text-anchor="middle" class="node-title">Embodiment Config</text>
  <text x="192" y="386" text-anchor="middle" class="node-small">state/action keys</text>

  <line class="arrow" x1="292" y1="372" x2="342" y2="372"/>
  <rect x="350" y="330" width="188" height="84" rx="14" fill="url(#violet)" filter="url(#shadow)"/>
  <text x="444" y="358" text-anchor="middle" class="white-title">DreamZero-AgiBot</text>
  <text x="444" y="379" text-anchor="middle" class="white-small">world/action prior</text>
  <text x="444" y="398" text-anchor="middle" class="white-small">multi-view video input</text>

  <line class="arrow" x1="546" y1="372" x2="596" y2="372"/>
  <rect x="604" y="330" width="178" height="84" rx="14" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="693" y="358" text-anchor="middle" class="white-title">LoRA SFT</text>
  <text x="693" y="379" text-anchor="middle" class="white-small">low-rank adapter</text>
  <text x="693" y="398" text-anchor="middle" class="white-small">debug before full FT</text>

  <line class="arrow" x1="790" y1="372" x2="840" y2="372"/>
  <rect class="box" x="848" y="330" width="178" height="84" rx="14"/>
  <text x="937" y="358" text-anchor="middle" class="node-title">Offline Eval</text>
  <text x="937" y="379" text-anchor="middle" class="node-small">chunk smoothness</text>
  <text x="937" y="398" text-anchor="middle" class="mono">gripper timing</text>

  <line class="arrow" x1="1034" y1="372" x2="1084" y2="372"/>
  <rect class="box" x="1092" y="330" width="112" height="84" rx="14"/>
  <text x="1148" y="358" text-anchor="middle" class="node-title">Policy</text>
  <text x="1148" y="379" text-anchor="middle" class="node-small">LoRA ckpt</text>
  <text x="1148" y="398" text-anchor="middle" class="mono">24-step</text>

  <!-- Row 3 -->
  <rect class="box" x="84" y="520" width="168" height="72" rx="14"/>
  <text x="168" y="548" text-anchor="middle" class="node-title">Live Observation</text>
  <text x="168" y="570" text-anchor="middle" class="node-small">3 cameras + state</text>

  <line class="arrow" x1="260" y1="556" x2="312" y2="556"/>
  <rect x="320" y="510" width="178" height="92" rx="14" fill="url(#violet)" filter="url(#shadow)"/>
  <text x="409" y="540" text-anchor="middle" class="white-title">WebSocket Server</text>
  <text x="409" y="562" text-anchor="middle" class="white-small">DreamZero inference</text>
  <text x="409" y="582" text-anchor="middle" class="white-small">DiT cache enabled</text>

  <line class="arrow" x1="506" y1="556" x2="558" y2="556"/>
  <rect x="566" y="510" width="176" height="92" rx="14" fill="url(#orange)" filter="url(#shadow)"/>
  <text x="654" y="540" text-anchor="middle" class="white-title">Action Chunk</text>
  <text x="654" y="562" text-anchor="middle" class="white-small">execute first 3-5</text>
  <text x="654" y="582" text-anchor="middle" class="white-small">then replan</text>

  <line class="arrow" x1="750" y1="556" x2="802" y2="556"/>
  <rect class="box" x="810" y="510" width="174" height="92" rx="14"/>
  <text x="897" y="540" text-anchor="middle" class="node-title">Safety Adapter</text>
  <text x="897" y="562" text-anchor="middle" class="node-small">clamp / smooth / stop</text>
  <text x="897" y="582" text-anchor="middle" class="mono">joint + gripper limits</text>

  <line class="arrow" x1="992" y1="556" x2="1044" y2="556"/>
  <rect class="box" x="1052" y="510" width="152" height="92" rx="14"/>
  <text x="1128" y="540" text-anchor="middle" class="node-title">Real Robot</text>
  <text x="1128" y="562" text-anchor="middle" class="node-small">ALOHA / LeKiwi</text>
  <text x="1128" y="582" text-anchor="middle" class="mono">rollout videos</text>

  <path class="dash" d="M1128 610 C1128 668 168 668 168 604"/>
  <text x="634" y="688" text-anchor="middle" class="node-small">closed-loop evaluation: success phase, action clipping, failure mode, video comparison</text>

  <!-- Small side notes -->
  <rect class="chip" x="78" y="638" width="170" height="30" rx="15"/>
  <text x="163" y="658" text-anchor="middle" class="mono">mp4 = eval only</text>
  <rect class="chip" x="1016" y="638" width="188" height="30" rx="15"/>
  <text x="1110" y="658" text-anchor="middle" class="mono">LeRobot v2 aligned</text>
</svg>
